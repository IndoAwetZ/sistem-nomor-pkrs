<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penomoran PKRS</title>
    <!-- Menambahkan sedikit gaya CSS agar tabel rapi -->
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>Daftar Permintaan Nomor PKRS</h2>
    
    <table id="tabelPkrs">
        <thead>
            <tr>
                <th>ID</th>
                <th>Timestamp</th>
                <th>Nama Peminta</th>
                <th>Tanggal Permintaan</th>
                <th>Jenis Cetak</th>
                <th>Judul Keperluan</th>
                <th>Email Tujuan</th>
            </tr>
        </thead>
        <tbody id="isiTabel">
            <!-- Data akan muncul di sini secara otomatis -->
        </tbody>
    </table>

    <script>
        // Mengambil data dari jembatan API D1
        fetch('/api/surat')
            .then(response => response.json())
            .then(data => {
                const isiTabel = document.getElementById('isiTabel');
                data.forEach(baris => {
                    isiTabel.innerHTML += `
                        <tr>
                            <td>${baris.id}</td>
                            <td>${baris.timestamp}</td>
                            <td>${baris.nama_peminta}</td>
                            <td>${baris.tanggal_permintaan}</td>
                            <td>${baris.jenis_cetak}</td>
                            <td>${baris.judul_keperluan}</td>
                            <td>${baris.email}</td>
                        </tr>
                    `;
                });
            })
            .catch(error => {
                console.error('Terjadi kesalahan:', error);
                document.getElementById('isiTabel').innerHTML = '<tr><td colspan="7">Gagal memuat data.</td></tr>';
            });
    </script>
</body>
</html>
