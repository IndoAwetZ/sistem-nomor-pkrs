<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penomoran PKRS</title>
    <!-- Memanggil Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased relative">

    <!-- Navbar / Header Atas -->
    <nav class="bg-blue-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-white font-bold text-xl tracking-wider">RSUD PKRS HUB</span>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- Indikator Admin & Tombol Keluar -->
                    <div id="panelAdmin" class="hidden flex items-center space-x-3">
                        <span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2.5 py-1 rounded border border-yellow-300 shadow-sm">ADMIN MODE</span>
                        <button onclick="prosesLogout()" class="text-blue-100 text-sm hover:text-white font-medium transition-colors">Logout</button>
                    </div>

                    <!-- Tombol Nomor Baru (Sekarang memiliki fungsi onclick) -->
                    <button onclick="bukaModal()" class="bg-white text-blue-600 px-4 py-2 rounded-md font-medium text-sm hover:bg-gray-100 shadow transition-colors">
                        + Nomor Baru
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Daftar Permintaan</h1>
                <p class="text-sm text-gray-500 mt-1">Manajemen antrean pencetakan nomor PKRS.</p>
            </div>
        </div>

        <!-- Wadah Data (Loading State) -->
        <div id="loadingState" class="text-center py-10">
            <p class="text-gray-500 animate-pulse font-medium">Memuat data dari database...</p>
        </div>

        <!-- Tabel untuk Layar Lebar (Desktop/Tablet) -->
        <div class="hidden md:block bg-white shadow rounded-lg overflow-hidden border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-800 uppercase tracking-wider">Nomor PKRS</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tgl Permintaan</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Peminta</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Keperluan & Jenis</th>
                        <th id="kolomAksiHeader" class="hidden px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
                    </tr>
                </thead>
                <tbody id="isiTabelDesktop" class="bg-white divide-y divide-gray-200">
                    <!-- Data masuk ke sini -->
                </tbody>
            </table>
        </div>

        <!-- Kartu untuk Layar Kecil (Mobile) -->
        <div id="isiTabelMobile" class="md:hidden space-y-4">
            <!-- Data masuk ke sini -->
        </div>
    </main>

    <!-- ================= MODAL TAMBAH DATA ================= -->
    <!-- Elemen ini disembunyikan secara default menggunakan class "hidden" -->
    <div id="modalTambah" class="hidden fixed inset-0 z-50 bg-gray-900 bg-opacity-60 overflow-y-auto h-full w-full flex items-center justify-center transition-opacity">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md mx-4 relative">
            
            <h3 class="text-xl font-bold text-gray-900 mb-4">Buat Nomor PKRS Baru</h3>
            
            <form id="formTambah" onsubmit="simpanData(event)">
                <div class="space-y-4">
                    <!-- Input Nama Peminta -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Peminta</label>
                        <input type="text" id="nama_peminta" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cth: Budi Santoso">
                    </div>

                    <!-- Input Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Tujuan</label>
                        <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="email@rsud.com">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <!-- Input Tanggal -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tgl Permintaan</label>
                            <input type="date" id="tanggal_permintaan" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        
                        <!-- Pilihan Jenis Cetak -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jenis Cetak</label>
                            <select id="jenis_cetak" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                <option value="Spanduk">Spanduk</option>
                                <option value="Brosur">Brosur</option>
                                <option value="Stiker">Stiker</option>
                                <option value="Poster">Poster</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                    </div>

                    <!-- Input Judul Keperluan -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Judul Keperluan</label>
                        <input type="text" id="judul_keperluan" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cth: Sosialisasi Cuci Tangan">
                    </div>
                </div>

                <!-- Tombol Aksi Modal -->
                <div class="mt-6 flex justify-end space-x-3">
                    <button type="button" onclick="tutupModal()" class="px-4 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-md font-medium transition-colors">
                        Batal
                    </button>
                    <button type="submit" id="btnSubmit" class="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-md font-medium shadow transition-colors flex items-center">
                        Simpan & Generate
                    </button>
                </div>
            </form>
        </div>
    </div>
    <!-- ================= END MODAL ================= -->

    <script>
        // Logika Admin & Logout
        const peranSistem = localStorage.getItem('role_sistem');
        if (peranSistem === 'admin') {
            document.getElementById('panelAdmin').classList.remove('hidden');
            document.getElementById('kolomAksiHeader').classList.remove('hidden');
        }

        function prosesLogout() {
            localStorage.removeItem('role_sistem');
            window.location.reload(); 
        }

        function hapusData(id) {
            // 3. Fungsi Hapus Data
            async function hapusData(id) {
                // Tampilkan pop-up konfirmasi (mencegah klik tak sengaja)
                const konfirmasi = confirm(`AWAS: Apakah Anda yakin ingin menghapus antrean ID #${id}?\nData ini tidak dapat dikembalikan.`);
                
                if (konfirmasi) {
                    try {
                        // Tembak API Backend Anda dengan metode DELETE
                        const response = await fetch(`/api/pkrs?id=${id}`, {
                            method: 'DELETE'
                        });
                        
                        const result = await response.json();
                        
                        if (result.sukses) {
                            // Jika berhasil dihapus di database, segarkan halaman
                            window.location.reload(); 
                        } else {
                            alert('Gagal menghapus data: ' + result.error);
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        alert('Terjadi kesalahan saat menghubungi server.');
                    }
                }
            }
        }

        // ================= LOGIKA MODAL & FORM =================
        const modal = document.getElementById('modalTambah');
        const form = document.getElementById('formTambah');

        function bukaModal() {
            modal.classList.remove('hidden');
        }

        function tutupModal() {
            modal.classList.add('hidden');
            form.reset(); // Mengosongkan form saat ditutup
        }

        // Fungsi yang berjalan saat form disubmit
        async function simpanData(event) {
            event.preventDefault(); // Mencegah halaman refresh bawaan browser
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerHTML = 'Menyimpan...'; // Efek loading sederhana
            btnSubmit.disabled = true;

            // Mengambil semua isi inputan
            const dataKirim = {
                nama_peminta: document.getElementById('nama_peminta').value,
                tanggal_permintaan: document.getElementById('tanggal_permintaan').value,
                jenis_cetak: document.getElementById('jenis_cetak').value,
                judul_keperluan: document.getElementById('judul_keperluan').value,
                email: document.getElementById('email').value
            };

            try {
                // Mengirim metode POST ke fungsi API Backend Anda
                const response = await fetch('/api/pkrs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataKirim)
                });

                const result = await response.json();

                if (result.sukses) {
                    alert(`SUKSES!\nNomor PKRS Anda: ${result.nomor_pkrs}`);
                    tutupModal();
                    window.location.reload(); // Segarkan halaman untuk melihat tabel baru
                } else {
                    alert('Gagal menyimpan data: ' + result.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Terjadi kesalahan jaringan.');
            } finally {
                // Mengembalikan bentuk tombol seperti semula
                btnSubmit.innerHTML = 'Simpan & Generate';
                btnSubmit.disabled = false;
            }
        }
        // =======================================================

        // Menarik dan Menampilkan Data ke Tabel
        fetch('/api/pkrs')
            .then(response => response.json())
            .then(data => {
                document.getElementById('loadingState').style.display = 'none';
                
                const wadahDesktop = document.getElementById('isiTabelDesktop');
                const wadahMobile = document.getElementById('isiTabelMobile');
                
                const rentangKolom = peranSistem === 'admin' ? 6 : 5;

                if (data.length === 0 || data.error) {
                    wadahDesktop.innerHTML = `<tr><td colspan="${rentangKolom}" class="px-6 py-8 text-center text-sm text-gray-500">Belum ada data permintaan.</td></tr>`;
                    wadahMobile.innerHTML = '<div class="text-center py-10 text-gray-500">Belum ada data.</div>';
                    return;
                }

                data.forEach(baris => {
                    const nomorFinal = baris.nomor_pkrs_final || '<span class="text-gray-400 italic">Belum digenerate</span>';
                    
                    let selAksiDesktop = '';
                    let tombolAksiMobile = '';
                    
                    if (peranSistem === 'admin') {
                        selAksiDesktop = `
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-center">
                                <button onclick="hapusData(${baris.id})" class="text-red-500 hover:text-red-700 font-semibold transition-colors">Hapus</button>
                            </td>
                        `;
                        
                        tombolAksiMobile = `
                            <div class="mt-3 pt-3 border-t border-gray-100 flex justify-end">
                                <button onclick="hapusData(${baris.id})" class="text-red-500 hover:text-red-700 text-sm font-semibold flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    Hapus
                                </button>
                            </div>
                        `;
                    }

                    wadahDesktop.innerHTML += `
                        <tr class="hover:bg-blue-50/50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">#${baris.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">${nomorFinal}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${baris.tanggal_permintaan}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">
                                ${baris.nama_peminta}<br>
                                <span class="text-xs text-gray-500 font-normal">${baris.email}</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600">
                                <div class="font-medium text-gray-900">${baris.judul_keperluan}</div>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 mt-1">
                                    ${baris.jenis_cetak}
                                </span>
                            </td>
                            ${selAksiDesktop}
                        </tr>
                    `;

                    wadahMobile.innerHTML += `
                        <div class="bg-white shadow rounded-lg p-4 border border-gray-100 card-hover">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <span class="text-xs font-semibold text-blue-600 tracking-wider">#${baris.id}</span>
                                    <h3 class="text-lg font-bold text-gray-900 mt-1">${baris.judul_keperluan}</h3>
                                </div>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                    ${baris.tanggal_permintaan}
                                </span>
                            </div>
                            
                            <div class="bg-blue-50/80 rounded border border-blue-100 p-3 mb-3">
                                <p class="text-xs text-blue-600 font-semibold mb-1 uppercase tracking-wide">Nomor PKRS</p>
                                <p class="font-bold text-blue-900">${nomorFinal}</p>
                            </div>

                            <div class="text-sm text-gray-600 space-y-1">
                                <p><span class="font-medium text-gray-900">Peminta:</span> ${baris.nama_peminta}</p>
                                <p><span class="font-medium text-gray-900">Format:</span> ${baris.jenis_cetak}</p>
                            </div>
                            
                            ${tombolAksiMobile}
                        </div>
                    `;
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loadingState').innerHTML = '<span class="text-red-500 font-medium bg-red-50 px-4 py-2 rounded">Gagal mengambil data database.</span>';
            });
    </script>
</body>
</html>
