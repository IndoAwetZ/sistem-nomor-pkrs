<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Admin - PKRS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen font-sans antialiased">
    
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Login Admin</h2>
            <p class="text-sm text-gray-500 mt-1">Masukkan sandi untuk hak akses penuh</p>
        </div>

        <!-- Notifikasi Error (Disembunyikan secara default) -->
        <div id="pesanError" class="hidden bg-red-50 border-l-4 border-red-500 p-3 mb-5 rounded">
            <p class="text-sm text-red-700 font-medium">Kata sandi salah!</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Kata Sandi Rahasia</label>
                <input id="password" type="password" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" 
                    placeholder="••••••••" 
                    onkeypress="tangkapEnter(event)">
            </div>
            
            <button onclick="prosesLogin()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md shadow transition-colors">
                Verifikasi Akses
            </button>
        </div>

        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">&larr; Kembali ke Daftar Permintaan</a>
        </div>
    </div>

    <script>
        function prosesLogin() {
            const inputSandi = document.getElementById('password').value;
            const pesanError = document.getElementById('pesanError');
            
            // Sandi rahasia untuk versi Trial (Silakan ganti sesuai keinginan)
            const sandiRahasia = "adminpkrs2026"; 

            if (inputSandi === sandiRahasia) {
                // Simpan status admin di memori browser
                localStorage.setItem('role_sistem', 'admin');
                // Arahkan kembali ke halaman utama
                window.location.href = '/'; 
            } else {
                // Tampilkan pesan error jika salah
                pesanError.classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        }

        // Fungsi agar bisa login dengan menekan tombol Enter di keyboard
        function tangkapEnter(e) {
            if (e.key === 'Enter') {
                prosesLogin();
            }
        }
    </script>
</body>
</html>
